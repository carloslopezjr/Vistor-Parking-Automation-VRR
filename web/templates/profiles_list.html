{{template "layout" .}}

{{define "title"}}Manage Profiles{{end}}

{{define "content"}}
<section class="section">
    <h2 class="section__title">Manage Profiles</h2>
    <a class="btn btn--primary btn--full" href="/profiles/new">New Profile</a>

    {{if .Profiles}}
    <ul class="list">
        {{range .Profiles}}
        <li class="list__item">
            <div class="list__main">
                <strong>{{.ProfileName}}</strong><br>
                <span class="muted">{{.ResidentName}} · {{.LicensePlate}}</span>
            </div>
            <div class="list__actions">
                <a class="btn btn--small" href="/profiles/{{.ID}}/edit">Edit</a>
                <form method="post" action="/profiles/{{.ID}}/delete" class="inline-form">
                    <button class="btn btn--danger btn--small" type="submit">Delete</button>
                </form>
            </div>
        </li>
        {{end}}
    </ul>
    {{else}}
    <p>No profiles yet.</p>
    {{end}}
</section>
<section class="section section--secondary">
    <a class="btn btn--secondary btn--full" href="/">Back to Home</a>
</section>
{{end}}
